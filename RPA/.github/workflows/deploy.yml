# RPA CI/CD Pipeline
# 
# Triggers on push to main branch:
# 1. Runs tests (pytest)
# 2. Builds Docker images
# 3. Pushes to GitHub Container Registry (GHCR)
# 4. Optionally deploys to production server
#
# Images are public - anyone can pull without auth:
#   docker pull ghcr.io/bbrngit/rpa-backend:latest
#   docker pull ghcr.io/bbrngit/rpa-frontend:latest
#   docker pull ghcr.io/bbrngit/rpa-sandbox:latest

name: RPA CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/rpa

jobs:
  # =============================================================================
  # Job 1: Test - Run pytest, block deployment if tests fail
  # =============================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: RPA
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with pytest
        working-directory: RPA
        run: |
          pytest tests/ -v --tb=short --maxfail=5
        continue-on-error: false

  # =============================================================================
  # Job 2: Build and Push Docker Images
  # =============================================================================
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test  # Only runs if tests pass
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write  # Required to push to GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-sandbox
          tags: |
            type=raw,value=latest
            type=sha,prefix=v

      # Build Backend
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./RPA
          file: ./RPA/docker/backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build Frontend
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./RPA/docker/frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build Sandbox
      - name: Build and push sandbox
        uses: docker/build-push-action@v5
        with:
          context: ./RPA
          file: ./RPA/docker/sandbox/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-sandbox:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Docker Images Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Pull Command |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | \`docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | \`docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Sandbox | \`docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-sandbox:latest\` |" >> $GITHUB_STEP_SUMMARY

  # =============================================================================
  # Job 3: Deploy to Production (Optional - requires server setup)
  # =============================================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    # Only runs if SSH secrets are configured
    # To enable: Add SSH_PRIVATE_KEY and SERVER_IP to repository secrets
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        if: ${{ secrets.SSH_PRIVATE_KEY != '' && secrets.SERVER_IP != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER || 'root' }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/rpa
            ./deploy.sh

      - name: No server configured
        if: ${{ secrets.SSH_PRIVATE_KEY == '' || secrets.SERVER_IP == '' }}
        run: |
          echo "### No Production Server Configured" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Images are available on GHCR. To deploy to a server:" >> $GITHUB_STEP_SUMMARY
          echo "1. Add \`SSH_PRIVATE_KEY\` secret" >> $GITHUB_STEP_SUMMARY
          echo "2. Add \`SERVER_IP\` secret" >> $GITHUB_STEP_SUMMARY
          echo "3. Re-run this workflow" >> $GITHUB_STEP_SUMMARY
