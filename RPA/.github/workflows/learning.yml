name: RPA Learning Pipeline

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      domain:
        description: 'Learning domain'
        required: true
        default: 'english'
        type: choice
        options:
          - english
          - python
          - all
      samples:
        description: 'Number of samples to process'
        required: true
        default: '100'
        type: string

  # Scheduled runs (UTC times)
  schedule:
    # Every 6 hours - English learning
    - cron: '0 */6 * * *'
    # Daily at midnight UTC - Full training
    - cron: '0 0 * * *'
    # Weekly on Sunday at 6am UTC - Deep training
    - cron: '0 6 * * 0'

  # Run on push to main (for testing)
  push:
    branches: [main]
    paths:
      - 'learn_pipeline.py'
      - '.github/workflows/learning.yml'

env:
  PYTHON_VERSION: '3.11'

jobs:
  learn:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install datasets

      - name: Create memory directory
        run: mkdir -p memory/learning_state

      - name: Determine learning parameters
        id: params
        run: |
          # Default values
          DOMAIN="english"
          SAMPLES=100

          # Check trigger type
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DOMAIN="${{ github.event.inputs.domain }}"
            SAMPLES="${{ github.event.inputs.samples }}"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            HOUR=$(date -u +%H)
            DAY=$(date -u +%u)

            # Different learning based on schedule
            if [ "$DAY" = "7" ]; then
              # Sunday - Full training
              DOMAIN="all"
              SAMPLES=200
            elif [ "$HOUR" = "00" ]; then
              # Midnight - Full training
              DOMAIN="all"
              SAMPLES=150
            elif [ $((HOUR % 12)) -eq 0 ]; then
              # Every 12 hours - Python
              DOMAIN="python"
              SAMPLES=100
            else
              # Every 6 hours - English
              DOMAIN="english"
              SAMPLES=100
            fi
          fi

          echo "domain=${DOMAIN}" >> $GITHUB_OUTPUT
          echo "samples=${SAMPLES}" >> $GITHUB_OUTPUT
          echo "Learning: ${DOMAIN} with ${SAMPLES} samples"

      - name: Run learning pipeline
        run: |
          python learn_pipeline.py \
            --domain "${{ steps.params.outputs.domain }}" \
            --samples "${{ steps.params.outputs.samples }}" \
            --persistence "memory/learning_state" \
            --verbose

      - name: Upload learning state
        uses: actions/upload-artifact@v4
        with:
          name: learning-state-${{ github.run_id }}
          path: memory/learning_state/
          retention-days: 30

      - name: Generate learning report
        if: always()
        run: |
          echo "## 🧠 RPA Learning Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Domain:** ${{ steps.params.outputs.domain }}" >> $GITHUB_STEP_SUMMARY
          echo "**Samples:** ${{ steps.params.outputs.samples }}" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Learning State" >> $GITHUB_STEP_SUMMARY
          if [ -f "memory/learning_state/english_progress.json" ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat memory/learning_state/english_progress.json | head -50 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  # Optional: Run tests after learning
  test:
    runs-on: ubuntu-latest
    needs: learn
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short -q
