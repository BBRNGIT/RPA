# RPA Full Stack - Docker Compose Configuration
# 
# Three services:
#   - rpa-backend: FastAPI REST + WebSocket server
#   - rpa-frontend: React app served via Nginx
#   - rpa-sandbox: Isolated Python execution (no network)
#
# Usage:
#   Production: docker compose up -d
#   Build:      docker compose -f docker-compose.yml -f docker-compose.build.yml up --build

services:
  # ==========================================================================
  # RPA Backend - FastAPI REST + WebSocket Server
  # ==========================================================================
  rpa-backend:
    image: ghcr.io/bbrngit/rpa-backend:latest
    container_name: rpa-backend
    restart: unless-stopped
    
    environment:
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN:-}
      - SECRET_KEY=${SECRET_KEY:-rpa-secret-key-change-in-production}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:80}
      - LTM_DATA_PATH=/data
      - SANDBOX_TIMEOUT=${SANDBOX_TIMEOUT:-10}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-production}
    
    volumes:
      - rpa-data:/data
      - rpa-memory:/app/memory
      - ./curriculum:/app/curriculum:ro
    
    networks:
      - rpa-internal
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    depends_on:
      - rpa-sandbox

  # ==========================================================================
  # RPA Frontend - React + Nginx
  # ==========================================================================
  rpa-frontend:
    image: ghcr.io/bbrngit/rpa-frontend:latest
    container_name: rpa-frontend
    restart: unless-stopped
    
    ports:
      - "80:80"
      - "443:443"
    
    volumes:
      - ssl-certs:/etc/nginx/ssl:ro
    
    networks:
      - rpa-internal
    
    depends_on:
      - rpa-backend
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================================================
  # RPA Sandbox - Isolated Python Execution
  # ==========================================================================
  rpa-sandbox:
    image: ghcr.io/bbrngit/rpa-sandbox:latest
    container_name: rpa-sandbox
    restart: unless-stopped
    
    # No network access for security
    network_mode: none
    
    # Resource limits for untrusted code execution
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    
    # Read-only filesystem except for temp
    read_only: true
    tmpfs:
      - /tmp:size=50M,mode=1777
    
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

# ==========================================================================
# Networks
# ==========================================================================
networks:
  rpa-internal:
    driver: bridge
    internal: false  # Backend needs external access for HF datasets

# ==========================================================================
# Volumes
# ==========================================================================
volumes:
  rpa-data:
    driver: local
  rpa-memory:
    driver: local
  ssl-certs:
    driver: local
