# Docker Compose Build Configuration
# Used by GitHub Actions to build images from source
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml build
#
# Note: Frontend is a Next.js app in the parent directory (../)
#       Backend and Sandbox are Python apps in this directory

services:
  rpa-backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    image: ghcr.io/bbrngit/rpa-backend:latest

  rpa-frontend:
    build:
      context: ..
      dockerfile: RPA/docker/frontend/Dockerfile
    image: ghcr.io/bbrngit/rpa-frontend:latest

  rpa-sandbox:
    build:
      context: .
      dockerfile: docker/sandbox/Dockerfile
    image: ghcr.io/bbrngit/rpa-sandbox:latest
